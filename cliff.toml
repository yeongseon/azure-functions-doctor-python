[changelog]
header = "# Changelog\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for commit in commits %}
- {{ commit.message }} ({{ commit.id }})
{% endfor %}
"""
footer = ""

[git]
conventional = true
filter_unconventional = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"

[groups]
feat = "Features"
fix = "Fixes"
docs = "Documentation"
refactor = "Refactoring"
test = "Tests"
chore = "Chore"
ci = "CI/CD"
style = "Style"
perf = "Performance"
build = "Build"
